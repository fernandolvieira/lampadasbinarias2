<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ranking Binário - Prof. Fernando</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #eee; text-align: center; padding: 20px; }
        
        /* Container Principal */
        .container { max-width: 800px; margin: 0 auto; }
        
        /* Tela de Entrada */
        .setup-screen { background: #1e1e1e; padding: 30px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        input { padding: 12px; width: 250px; border-radius: 5px; border: 1px solid #444; background: #000; color: #fff; font-size: 1rem; }
        
        /* Tabela de Ranking */
        .rank-section { background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #2979ff; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #333; text-align: center; }
        th { color: #2979ff; text-transform: uppercase; font-size: 0.8rem; }
        .top-3 { color: #ffeb3b; font-weight: bold; }

        /* Jogo */
        .game-screen { display: none; }
        #target-num { color: #ff3d00; font-size: 6rem; font-weight: bold; margin: 20px 0; }
        .lamp-container { display: flex; justify-content: center; gap: 12px; margin: 30px 0; flex-wrap: wrap; }
        
        /* Lâmpada Visual */
        .bit-box { display: flex; flex-direction: column; align-items: center; width: 60px; }
        .lamp { 
            width: 50px; height: 80px; background: #333; border-radius: 25px 25px 10px 10px; 
            cursor: pointer; border: 3px solid #000; transition: 0.3s;
        }
        .lamp.on { background: #ffeb3b; box-shadow: 0 0 25px #ffeb3b; border-color: #fbc02d; }
        .legend { font-size: 0.8rem; margin-top: 5px; color: #888; font-family: monospace; }

        button { padding: 12px 30px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; background: #2979ff; color: white; }
        button:hover { filter: brightness(1.2); }
        .btn-skip { background: #555; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup">
        <div class="setup-screen">
            <h1 style="color: #2979ff; margin-top: 0;">Desafio Binário</h1>
            <p>Converte 3 números no menor tempo possível para entrar no Ranking!</p>
            <input type="text" id="player-name" placeholder="Teu Nome ou Login...">
            <br><br>
            <button onclick="startGame()">INICIAR DESAFIO</button>
        </div>

        <div class="rank-section">
            <h3 style="margin-top: 0;">🏆 TOP 10 DA TURMA</h3>
            <table id="main-rank">
                <thead>
                    <tr><th>Pos</th><th>Aluno</th><th>Pulos/Erros</th><th>Tempo Total</th></tr>
                </thead>
                <tbody id="rank-body-init">
                    <tr><td colspan="4">A carregar classificação...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="game" class="game-screen">
        <div style="background: #252525; padding: 15px; border-radius: 8px;">
            <b>Ronda:</b> <span id="round-count">1</span>/3 | 
            <b>Tempo:</b> <span id="timer">0</span>s | 
            <b>Pulos:</b> <span id="error-count">0</span>
        </div>

        <div id="target-num">0</div>

        <div class="lamp-container" id="lamps"></div>

        <button onclick="checkAnswer()">ENVIAR RESPOSTA</button>
        <button class="btn-skip" onclick="skipRound()">PULAR</button>
    </div>
</div>

<script>
    const API_URL = "URL_DO_SEU_APPS_SCRIPT"; // Coloca aqui o teu URL do Google Apps Script
    let playerName, startTime, timerInterval, currentTarget, round = 1, errors = 0;

    // Carrega o ranking assim que abre o site
    window.onload = loadInitialRanking;

    function loadInitialRanking() {
        fetch(API_URL).then(r => r.json()).then(data => {
            const body = document.getElementById('rank-body-init');
            if (data.length === 0) {
                body.innerHTML = "<tr><td colspan='4'>Ninguém jogou ainda. Sê o primeiro!</td></tr>";
                return;
            }
            body.innerHTML = data.map((r, i) => `
                <tr class="${i < 3 ? 'top-3' : ''}">
                    <td>${i+1}º</td>
                    <td>${r[0]}</td>
                    <td>${3 - r[1]}</td>
                    <td>${r[2]}s</td>
                </tr>`).join('');
        }).catch(() => {
            document.getElementById('rank-body-init').innerHTML = "<tr><td colspan='4'>Erro ao carregar ranking. Verifica o URL da API.</td></tr>";
        });
    }

    function startGame() {
        playerName = document.getElementById('player-name').value.trim();
        if(!playerName) return alert("Introduz o teu nome para registar no ranking!");
        
        document.getElementById('setup').style.display = 'none';
        document.getElementById('game').style.display = 'block';
        
        startTime = Date.now();
        timerInterval = setInterval(() => {
            document.getElementById('timer').innerText = Math.floor((Date.now() - startTime) / 1000);
        }, 1000);

        initRound();
    }

    function initRound() {
        currentTarget = Math.floor(Math.random() * 1024);
        document.getElementById('target-num').innerText = currentTarget;
        document.getElementById('round-count').innerText = round;
        
        const container = document.getElementById('lamps');
        container.innerHTML = "";
        for (let i = 9; i >= 0; i--) {
            container.innerHTML += `
                <div class="bit-box">
                    <div class="lamp" id="l-${i}" onclick="this.classList.toggle('on')"></div>
                    <div class="legend">2<sup>${i}</sup></div>
                    <div class="legend" style="color:#00e676">${Math.pow(2, i)}</div>
                </div>`;
        }
    }

    function checkAnswer() {
        let total = 0;
        for (let i = 0; i < 10; i++) {
            if (document.getElementById(`l-${i}`).classList.contains('on')) total += Math.pow(2, i);
        }

        if (total === currentTarget) {
            if (round < 3) { round++; initRound(); } 
            else { finishGame(); }
        } else {
            alert("Soma incorreta! Verifica os valores das lâmpadas.");
        }
    }

    function skipRound() {
        errors++;
        document.getElementById('error-count').innerText = errors;
        if (round < 3) { round++; initRound(); } 
        else { finishGame(); }
    }

    async function finishGame() {
        clearInterval(timerInterval);
        const finalTime = Math.floor((Date.now() - startTime) / 1000);
        
        // Envia para a tua folha Google
        try {
            await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ nome: playerName, acertos: (3 - errors), tempo: finalTime })
            });
        } catch (e) { console.error("Erro ao gravar"); }

        alert(`Concluído! Tempo: ${finalTime}s | Pulos: ${errors}. A atualizar ranking...`);
        location.reload(); 
    }
</script>

</body>
</html>
